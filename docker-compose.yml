services:
  db:
    image: postgres:17-alpine
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
    command: >
      sh -c "
      alembic upgrade head &&
      python main.py
      "
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data_local:
